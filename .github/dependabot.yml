# Dependabot keeps action versions up to date automatically.
# Opens pull requests when new versions release. You merge or ignore.
#
# npm ecosystem will be added in Phase A2 when package.json exists.
#
# Docs: https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
