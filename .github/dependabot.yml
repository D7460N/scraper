# Dependabot keeps action and package versions up to date automatically.
# Opens pull requests when new versions release. You merge or ignore.
# Zero manual monitoring required.
#
# Docs: https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  # GitHub Actions used in workflows under .github/workflows/
  # (e.g. actions/checkout). Active now.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"

  # npm packages from package.json at repo root.
  # No-op until A2 adds package.json, then activates automatically.
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"
